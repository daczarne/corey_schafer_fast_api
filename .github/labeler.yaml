docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
env:
  - changed-files:
      - any-glob-to-any-file:
          - .python-version
          - pyproject.toml
          - uv.lock
tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**
          - pytest.ini
tools:
  - changed-files:
      - any-glob-to-any-file:
          - .cspell.json
          - .editorconfig
          - .gitattributes
          - .gitignore
          - .gitmodules
          - .markdownlint-cli2.yaml
          - .markdownlint.yaml
          - .yamlignore
          - .yamllint.yaml
vs-code-settings:
  - changed-files:
      - any-glob-to-any-file:
          - .vscode/**
workflows:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
